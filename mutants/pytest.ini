[pytest]
DJANGO_SETTINGS_MODULE = afriride_system.django_app.config.settings
python_files = tests.py test_*.py *_tests.py
pythonpath = .


addopts = 
    --strict-markers
    --disable-warnings
    --maxfail=1
    --cov=afritech
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=95

testpaths = tests
