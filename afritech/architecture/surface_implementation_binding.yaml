schema: afritech.binding_registry.v2

version: 2

metadata:

  authority: ARCHITECTURE
  status: ACTIVE
  mutability: CONTROLLED

  registry_class: CONSTITUTIONAL_BINDING_REGISTRY

  description: >
    Canonical constitutional binding registry governing
    replay-safe implementation bindings, execution
    admissibility bindings, runtime activation semantics,
    proof participation semantics, evaluation semantics,
    speculative doctrine containment, and deterministic
    binding resolution within AfriTech.

    Bindings define:
      - implementation legitimacy
      - execution admissibility
      - replay participation
      - proof participation
      - runtime activation authority
      - speculative containment semantics
      - deterministic binding resolution
      - closed-world binding alignment

    Binding legitimacy is constitutional metadata only.

    Binding legitimacy does NOT independently confer:
      - runtime sovereignty
      - governance authority
      - replay authority
      - execution legitimacy
      - constitutional authority

    Binding participation remains bounded by:
      - admissibility law
      - replay admissibility
      - invariant preservation
      - deterministic execution
      - canonical ontology resolution
      - closed-world execution semantics


# ============================================================
# PATH ONTOLOGY ALIGNMENT
# ============================================================

ontology_alignment:

  canonical_identity_form: module_path

  deterministic_resolution_required: true

  replay_safe_resolution_required: true

  observer_independent_required: true

  forbidden_identity_forms:

    - filesystem_path
    - extension_identity
    - relative_identity
    - symbolic_short_name
    - reflection_based_identity

  description: >
    Binding resolution requires canonical module-path
    ontology semantics.


# ============================================================
# IMPLEMENTATION STATES
# ============================================================

implementation_states:

  PLANNED:

    executable: false

    runtime_admissible: false

    replay_participating: false

    proof_admissible: false

    deterministic_execution: false

    replay_safe: false

    description: >
      Constitutionally declared but operationally
      non-admissible implementation state.


  PARTIAL:

    executable: constrained

    runtime_admissible: conditional

    replay_participating: conditional

    proof_admissible: conditional

    deterministic_execution: conditional

    replay_safe: conditional

    description: >
      Constitutionally constrained partially implemented
      operational state.


  IMPLEMENTED:

    executable: true

    runtime_admissible: true

    replay_participating: true

    proof_admissible: true

    deterministic_execution: true

    replay_safe: true

    description: >
      Fully operational replay-safe deterministic
      implementation state.

  FROZEN:

    executable: false

    runtime_admissible: false

    replay_participating: false

    proof_admissible: false

    deterministic_execution: true

    replay_safe: true

    description: >
      Explicitly non-operational but constitutionally resolved
      surface state. FROZEN bindings are complete by containment
      and cannot execute, replay, emit proof, or emit witnesses.


  DOCUMENTARY:

    executable: false

    runtime_admissible: false

    replay_participating: false

    proof_admissible: false

    deterministic_execution: false

    replay_safe: false

    description: >
      Documentation-only non-operational implementation
      state.


  FORBIDDEN_ALIAS:

    executable: false

    runtime_admissible: false

    replay_participating: false

    proof_admissible: false

    deterministic_execution: false

    replay_safe: false

    description: >
      Constitutionally forbidden non-canonical alias state.


# ============================================================
# BINDINGS
# ============================================================

bindings:

  # ----------------------------------------------------------
  # RUNTIME ACTIVATION
  # ----------------------------------------------------------

  runtime_activation:

    canonical_identity:
      afritech.runtime.activation

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      RUNTIME

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

      - runtime_activation
      - execution_admission
      - replay_activation
      - execution_surface_binding

    enforced_by:

      - afritech.runtime.admission
      - afritech.ci.execution_surface_validation
      - afritech.ci.replay_validation

    witness_dependencies:

      - afritech.proof.constitutional_receipt
      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.replay_witness

    guarantees:

      - deterministic_runtime_activation
      - replay_safe_execution
      - invariant_preserving_execution
      - closed_world_execution

    forbidden:

      - probabilistic_activation
      - undeclared_execution_surfaces
      - observer_relative_activation
      - reflection_based_runtime_binding

    description: >
      Canonical deterministic runtime activation binding.


  # ----------------------------------------------------------
  # RUNTIME ENGINE
  # ----------------------------------------------------------

  runtime_engine:

    canonical_identity:
      afritech.runtime.engine

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      RUNTIME

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

      - dispatch
      - routing
      - execution
      - replay_binding

    data_locality:
      enforced: true
      rule: RULE-036
      guard: afritech.guards.data_locality_guard.validate_data_locality

    enforced_by:

      - afritech.ci.execution_completeness_validator
      - afritech.ci.invariant_validator
      - afritech.ci.receipt_validator
      - afritech.guards.data_locality_guard

    witness_dependencies:

      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.replay_witness
      - afritech.proof.witness.transcript_witness

    guarantees:

      - deterministic_runtime_execution
      - invariant_enforced_execution
      - replay_safe_dispatch

    forbidden:

      - authority_escalation
      - surface_extension
      - nondeterministic_dispatch

    description: >
      Canonical runtime engine binding for deterministic,
      invariant-enforced execution.


  # ----------------------------------------------------------
  # RUNTIME ADMISSION
  # ----------------------------------------------------------

  runtime_admission:

    canonical_identity:
      afritech.runtime.admission

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      RUNTIME

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

      - guard_enforcement
      - admission_control
      - runtime_refusal

    enforced_by:

      - afritech.ci.surface_state_resolution_validator
      - afritech.ci.binding_completeness_validator
      - afritech.ci.receipt_validator

    witness_dependencies:

      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.replay_witness

    guarantees:

      - deterministic_admission
      - guard_enforced_execution
      - closed_world_runtime_entry

    forbidden:

      - undeclared_surface_admission
      - speculative_runtime_admission
      - admission_without_receipt

    description: >
      Runtime admission binding for deterministic guard
      enforcement and receipt-bound refusal.


  # ----------------------------------------------------------
  # RUNTIME ORCHESTRATION
  # ----------------------------------------------------------

  runtime_orchestration:

    canonical_identity:
      afritech.runtime.orchestration

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      RUNTIME

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    locality_scheduler:
      implementation: afritech.runtime.locality.scheduler
      role: locality_enforcement_and_optimization
      deterministic_required: true
      replay_safe_required: true
      witness_requirements:
        - locality_trace
        - scheduler_trace

    execution_graph_optimizer:
      implementation: afritech.runtime.orchestration.execution_graph_optimizer
      role: replay_safe_dag_optimization
      deterministic_required: true
      replay_safe_required: true
      witness_requirements:
        - graph_optimizer_trace
        - scheduler_trace

    authority_scope:

      - deterministic_ordering
      - execution_sequence_control
      - replay_order_alignment
      - locality_enforcement_and_optimization
      - replay_safe_dag_optimization

    enforced_by:

      - afritech.ci.ast_call_order_validator
      - afritech.ci.execution_completeness_validator
      - afritech.runtime.locality.scheduler
      - afritech.runtime.orchestration.execution_graph_optimizer

    witness_dependencies:

      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.transcript_witness
      - locality_trace
      - scheduler_trace
      - graph_optimizer_trace

    guarantees:

      - deterministic_ordering
      - replay_order_alignment
      - no_observer_relative_schedule
      - deterministic_scheduler_replay
      - locality_governed_optimization
      - deterministic_graph_optimization
      - partition_preserving_pipeline_fusion
      - zero_copy_graph_flow_traceability

    forbidden:

      - nondeterministic_schedule
      - hidden_execution_order
      - observer_relative_ordering
      - untraced_scheduler_adjustment
      - cross_partition_work_stealing
      - cross_partition_pipeline_fusion
      - untraced_graph_optimization

    description: >
      Runtime orchestration binding for deterministic execution
      ordering and replay-aligned scheduling.


  # ----------------------------------------------------------
