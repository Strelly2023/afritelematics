      runtime_activation:
        implementation: afritech.edge.adapter.runtime_adapter

      proof:
        implementation: afritech.proof.witness.execution_witness

      evaluation:
        implementation: afritech.edge.adapter.validation

    guarantees:

      - deterministic_external_input_adaptation
      - canonical_request_envelope_generation
      - closed_world_edge_admission

    forbidden:

      - direct_external_runtime_execution
      - observer_relative_adaptation
      - filesystem_identity_resolution

