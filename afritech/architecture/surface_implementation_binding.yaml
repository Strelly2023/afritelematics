    witness_dependencies:

      - distributed_fabric_trace
      - scheduler_trace
      - graph_optimizer_trace
      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.replay_witness

    guarantees:

      - canonical_partition_ownership
      - deterministic_network_placement
      - replay_safe_failover
      - deterministic_distributed_merge
      - fabric_trace_replay_validation

    forbidden:

      - random_node_selection
      - realtime_load_authority
      - undeclared_partition_ownership
      - nondeterministic_failover
      - untraced_distributed_routing

    description: >
      Distributed multi-node execution fabric binding for
      replay-safe cluster-wide partition orchestration,
      network-aware scheduling, deterministic failover, and
      canonical merge ordering.


  # ----------------------------------------------------------
