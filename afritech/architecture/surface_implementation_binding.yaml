    category:
      DISTRIBUTED_RUNTIME

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

      - deterministic_autoscaling
      - cross_cluster_federation
      - hardware_policy_binding
      - execution_snapshot_management
      - resource_contract_enforcement

    enforced_by:

      - afritech.distributed.os.distributed_os
      - afritech.distributed.fabric.execution_fabric

    witness_dependencies:

      - distributed_os_trace
      - distributed_fabric_trace
      - scheduler_trace
      - graph_optimizer_trace
      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.replay_witness

    guarantees:

      - deterministic_environment_planning
      - replay_safe_autoscaling
      - canonical_federation_routing
      - deterministic_hardware_binding
      - persistent_snapshot_replayability
      - declared_resource_containment

    forbidden:

      - realtime_load_authority
      - random_scaling
      - latency_based_routing_authority
      - dynamic_hardware_selection
      - untraced_snapshot_restore
      - resource_contract_escape

    description: >
      Deterministic distributed OS binding for replay-safe
      environment planning above the execution engine,
      including autoscaling, federation routing, hardware
      binding, execution snapshots, and resource contracts.


  # ----------------------------------------------------------
  # PROOF
  # ----------------------------------------------------------

  proof:

    canonical_identity:
      afritech.proof

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      PROOF

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

      - replay_attestation
      - witness_generation
      - constitutional_receipt_generation
      - transcript_validation

    enforced_by:

      - afritech.ci.witness_validation
      - afritech.ci.replay_validation

    witness_dependencies:

      - afritech.proof.witness.replay_witness
      - afritech.proof.witness.execution_witness
      - afritech.proof.witness.transcript_witness
      - afritech.proof.witness.mutation_witness

    guarantees:

      - deterministic_proof_generation
      - replay_safe_attestation
      - invariant_preserving_proof

    completed_capabilities:

      - full_execution_chain_attestation
      - full_transcript_lineage_validation
      - global_replay_equivalence_validation

    forbidden:

      - observer_relative_proof
      - speculative_proof_generation
      - probabilistic_reconstruction

    description: >
      Fully implemented deterministic proof-binding surface.


  # ----------------------------------------------------------
  # EVALUATION
  # ----------------------------------------------------------

  evaluation:

    canonical_identity:
      afritech.evaluation

    implementation_state:
      FROZEN

    ontology:
      CANONICAL_MODULE_PATH

    category:
      EVALUATION

    replay_significance:
      FORBIDDEN

    deterministic_required:
      true

    replay_safe_required:
      false

    closed_world_required:
      true

    runtime_admissible:
      false

    replay_participating:
      false

    proof_admissible:
      false

    authority_scope:

      - execution_evaluation
      - invariant_evaluation
      - replay_consistency_analysis
      - deterministic_metric_evaluation

    enforced_by:

      - afritech.ci.execution_completeness_validator

    witness_dependencies: []

    guarantees:

      - deterministic_non_execution
      - closed_world_containment
      - no_runtime_participation

    freeze_reason: >
      Evaluation remains a governed analytical namespace until
      runtime, replay, proof, and witness bindings are explicitly
      implemented through a future constitutional amendment.

    forbidden:

      - probabilistic_evaluation
      - observer_relative_analysis
      - undeclared_metric_surfaces

    description: >
      Constitutionally frozen evaluation binding.


  # ----------------------------------------------------------
  # REPLAY
  # ----------------------------------------------------------

  replay:

    canonical_identity:
      afritech.verify.replay

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      REPLAY

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

      - replay_validation
      - replay_admissibility
      - replay_divergence_detection

    enforced_by:

      - afritech.verify.replay
      - afritech.verify.verify_execution_lineage
      - afritech.verify.verify_multi_epoch_replay

    witness_dependencies:

      - afritech.proof.witness.replay_witness
      - afritech.proof.witness.witness_bundle

    guarantees:

      - authoritative_replay
      - deterministic_reconstruction
      - replay_equivalence

    forbidden:

      - observer_relative_replay
      - replay_without_trace
      - replay_without_receipt

    description: >
      Authoritative replay binding for deterministic validation,
      lineage verification, and replay divergence detection.


  # ----------------------------------------------------------
  # SPECULATIVE
  # ----------------------------------------------------------

  speculative:

    canonical_identity:
      afritech.speculative

    implementation_state:
      FROZEN

    ontology:
      CANONICAL_MODULE_PATH

    category:
      SPECULATIVE

    replay_significance:
      FORBIDDEN

    deterministic_required:
      false

    replay_safe_required:
      false

    closed_world_required:
      true

    runtime_admissible:
      false

    replay_participating:
      false

    proof_admissible:
      false

    authority_scope:

      - speculative_research
      - doctrine_exploration
      - theoretical_modeling

    enforced_by:

      - afritech.ci.execution_surface_validation

    witness_dependencies: []

    guarantees:

      - containment_only

    forbidden:

      - runtime_execution
      - replay_participation
      - proof_generation
      - constitutional_authority
      - execution_surface_admission

    containment_rules:

      - speculative_surfaces_must_not_execute
      - speculative_surfaces_must_not_bind_runtime
      - speculative_surfaces_must_not_generate_receipts
      - speculative_surfaces_must_not_generate_witnesses

    description: >
      Constitutionally contained speculative doctrine space
      with no runtime or replay legitimacy.


  # ----------------------------------------------------------
  # EDGE ADAPTER
  # ----------------------------------------------------------

  edge_adapter:

