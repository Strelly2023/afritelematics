  # ----------------------------------------------------------

  edge_ingestion:

    canonical_identity:
      afritech.edge.ingestion

    implementation_state:
      IMPLEMENTED

    ontology:
      CANONICAL_MODULE_PATH

    category:
      EDGE

    replay_significance:
