    category:
      DISTRIBUTED_RUNTIME

    replay_significance:
      REQUIRED

    deterministic_required:
      true

    replay_safe_required:
      true

    closed_world_required:
      true

    runtime_admissible:
      true

    replay_participating:
      true

    proof_admissible:
      true

    authority_scope:

