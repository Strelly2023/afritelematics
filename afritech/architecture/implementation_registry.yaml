      - afritech.ci.witness_validation
      - afritech.ci.replay_validation
      - afritech.runtime.admission

    generated_artifacts:

      - constitutional_receipt
      - replay_hash
      - invariant_hash
      - execution_surface_hash

    completed_capabilities:

      - transcript_hash_generation
      - mutation_trace_hash_generation
      - full_execution_trace_reconstruction
      - global_replay_equivalence_validation

    forbidden_behaviors:

      - observer_relative_receipts
      - probabilistic_reconstruction
      - filesystem_identity_resolution
      - undeclared_execution_surfaces

    description: >
      Deterministic constitutional receipt generation surface.

      Fully implemented through deterministic receipt bundles,
      transcript hashes, mutation trace hashes, execution-chain
