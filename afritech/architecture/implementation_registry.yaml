schema: afritech.implementation_registry.v2

version: 2

metadata:

  authority: ARCHITECTURE

  status: ACTIVE

  mutability: CONTROLLED

  registry_class: CONSTITUTIONAL_IMPLEMENTATION_REGISTRY

  description: >
    Canonical implementation registry governing deterministic
    implementation legitimacy, replay admissibility,
    proof admissibility, ontology-safe identity resolution,
    and closed-world execution participation within AfriTech.

    Filesystem paths must never independently define
    constitutional identity.

    Canonical identity resolution derives exclusively from:
      - canonical module-path ontology
      - deterministic identity resolution
      - replay-safe implementation semantics
      - invariant-preserving execution semantics


# ============================================================
# IMPLEMENTATION STATES
# ============================================================

implementation_states:

  PLANNED:

    executable: false

    runtime_admissible: false

    replay_admissible: false

    proof_admissible: false

    deterministic_execution: false

    closed_world_aligned: false

    description: >
      Constitutionally declared but operationally
      non-admissible implementation state.


  PARTIAL:

    executable: constrained

    runtime_admissible: conditional

    replay_admissible: true

    proof_admissible: true

    deterministic_execution: true

    closed_world_aligned: true

    description: >
      Partially implemented deterministic replay-safe
      implementation state.


  IMPLEMENTED:

    executable: true

    runtime_admissible: true

    replay_admissible: true

    proof_admissible: true

    deterministic_execution: true

    closed_world_aligned: true

    description: >
      Fully implemented deterministic replay-safe
      implementation state.

  FROZEN:

    executable: false

    runtime_admissible: false

    replay_admissible: false

    proof_admissible: false

    deterministic_execution: true

    closed_world_aligned: true

    description: >
      Constitutionally declared and explicitly non-operational
      surface. FROZEN surfaces are complete as inert artifacts
      and may not participate in runtime, replay, proof, or
      witness generation.


  DOCUMENTARY:

    executable: false

    runtime_admissible: false

    replay_admissible: false

    proof_admissible: false

    deterministic_execution: false

    closed_world_aligned: false

    description: >
      Documentation-only implementation surface.


  FORBIDDEN_ALIAS:

    executable: false

    runtime_admissible: false

    replay_admissible: false

    proof_admissible: false

    deterministic_execution: false

    closed_world_aligned: false

    description: >
      Constitutionally forbidden alias identity.


