schema: afritech.governance.surface_registry.v1

surface_registry:

  # -----------------------------------------------------------------
  # PURPOSE
  # -----------------------------------------------------------------

  description: >
    The Surface Registry defines all system surfaces and their
    constitutional classification, execution eligibility,
    and governance status.

    It is the authoritative mapping used to determine:
      - which surfaces are executable
      - which surfaces are included in hash binding
      - which surfaces are governed
      - which surfaces are strictly informational

  classification_model: EXPLICIT_DECLARATION_ONLY

  # -----------------------------------------------------------------
  # GLOBAL INVARIANTS
  # -----------------------------------------------------------------

  invariants:

    - no_implicit_surfaces
    - only_declared_surfaces_may_execute
    - only_declared_surfaces_may_be_hashed
    - non_executable_surfaces_must_not_import_runtime
    - infrastructure_surfaces_are_non_constitutional

  enforcement:

    undeclared_surface_effect: HARD_FAILURE
    invalid_execution_effect: RUNTIME_INVALIDATION
    invalid_hash_inclusion: ATTESTATION_FAILURE

  # -----------------------------------------------------------------
  # SURFACE DEFINITIONS
  # -----------------------------------------------------------------

  surfaces:

    # =============================================================
    # CONSTITUTIONAL CORE
    # =============================================================

    registry:

      path: afritech/registry/
      type: CONSTITUTIONAL_CORE
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    attestation:

      path: afritech/registry/attestation.yaml
      type: CONSTITUTIONAL_CORE
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    epochs:

      path: afritech/registry/epochs/
      type: CONSTITUTIONAL_CORE
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    # =============================================================
    # GOVERNANCE
    # =============================================================

    execution_surfaces:

      path: afritech/governance/EXECUTION_SURFACES.yaml
      type: GOVERNANCE
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    rules:

      path: afritech/governance/
      type: GOVERNANCE
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    roles:

      path: afritech/governance/roles.yaml
      type: GOVERNANCE
      executable: false
      hash_included: false
      authority_scope: DOCUMENTARY

    surface_registry:

      path: afritech/governance/surface_registry.yaml
      type: GOVERNANCE
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    # =============================================================
    # RUNTIME (EXECUTION SURFACES)
    # =============================================================

    runtime_entry:

      path: afritech/runtime/main.py
      type: EXECUTION_ENTRYPOINT
      executable: true
      hash_included: true
      authority_scope: GUARDED

    runtime_engine:

      path: afritech/runtime/engine/
      type: EXECUTION_CORE
      executable: true
      hash_included: true
      authority_scope: GUARDED

    runtime_context:

      path: afritech/runtime/context/
      type: EXECUTION_CORE
      executable: true
      hash_included: true
      authority_scope: GUARDED

    runtime_admission:

      path: afritech/runtime/admission/
      type: EXECUTION_GUARD
      executable: true
      hash_included: true
      authority_scope: GLOBAL_GATE

    # =============================================================
    # INFERENCE (CONTROLLED EXECUTION)
    # =============================================================

    inference_requests:

      path: afritech/inference/
      type: CONTROLLED_EXECUTION
      executable: true
      hash_included: true
      authority_scope: AUTHORITY_BOUND

    authority_profiles:

      path: afritech/inference/authority_profiles.yaml
      type: AUTHORITY_DEFINITION
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    # =============================================================
    # REPLAY / PROOF SYSTEM
    # =============================================================

    replay_core:

      path: afritech/replay/
      type: REPLAY_SYSTEM
      executable: true
      hash_included: true
      authority_scope: VALIDATION_ONLY

    transcripts:

      path: afritech/replay/transcripts/
      type: PROOF_ARTIFACT
      executable: false
      hash_included: false
      authority_scope: EVIDENCE_ONLY

    replay_docs:

      path: afritech/replay/docs/
      type: DOCUMENTATION
      executable: false
      hash_included: false
      authority_scope: DOCUMENTARY

    # =============================================================
    # PROOF / CERTIFICATION
    # =============================================================

    runtime_certificate:

      path: afritech/proof/runtime_certificate.py
      type: CERTIFICATION_LOGIC
      executable: true
      hash_included: true
      authority_scope: VALIDATION_ONLY

    certificates:

      path: afritech/proof/certificates/
      type: CERTIFICATION_ARTIFACT
      executable: false
      hash_included: false
      authority_scope: EVIDENCE_ONLY

    proof_snapshot:

      path: afritech/proof/proof_snapshot.py
      type: CERTIFICATION_SUPPORT
      executable: true
      hash_included: true
      authority_scope: VALIDATION_ONLY

    # =============================================================
    # EVALUATION / TRUTH
    # =============================================================

    evaluation:

      path: afritech/evaluation/
      type: ANALYSIS
      executable: true
      hash_included: true
      authority_scope: OBSERVATION_ONLY

    truth_model:

      path: afritech/truth/
      type: EPISTEMIC
      executable: false
      hash_included: true
      authority_scope: GLOBAL

    # =============================================================
    # GUARDS / SAFETY
    # =============================================================

    guards:

      path: afritech/guards/
      type: EXECUTION_GUARD
      executable: true
      hash_included: true
      authority_scope: GLOBAL_GATE

    # =============================================================
    # AUDIT
    # =============================================================

    audit:

      path: afritech/audit/
      type: LOGGING
      executable: false
      hash_included: false
      authority_scope: OBSERVATION_ONLY

    # =============================================================
    # INFRASTRUCTURE (NON-CONSTITUTIONAL)
    # =============================================================

    infrastructure:

      path: afritech/infrastructure/
      type: NON_CONSTITUTIONAL
      executable: false
      hash_included: false
      authority_scope: NONE

    docker:

      path: afritech/docker/
      type: NON_CONSTITUTIONAL
      executable: false
      hash_included: false
      authority_scope: NONE

    ci:

      path: .github/workflows/
      type: NON_CONSTITUTIONAL
      executable: false
      hash_included: false
      authority_scope: NONE

  # -----------------------------------------------------------------
  # EXECUTION LAW
  # -----------------------------------------------------------------

  execution_law:

    requirements:

      - surface_must_be_declared
      - surface_must_be_executable_true
      - authority_scope_must_be_satisfied

    violation_response:

      - runtime_refusal
      - replay_invalidation
      - constitutional_failure

  # -----------------------------------------------------------------
  # HASH LAW
  # -----------------------------------------------------------------

  hash_law:

    requirements:

      - only_hash_included_surfaces_participate
      - all_hash_included_surfaces_must_be_stable
      - infrastructure_excluded_from_hash_chain

    violation_response:

      - attestation_invalidated
      - certificate_invalidated

  # -----------------------------------------------------------------
  # NON-EXECUTABLE SURFACES
  # -----------------------------------------------------------------

  non_executable_surfaces:

    - afritech/governance/roles.yaml
    - afritech/governance/INDEX.yaml
    - afritech/replay/docs/
    - afritech/audit/

  # -----------------------------------------------------------------
  # PHASE COMPATIBILITY
  # -----------------------------------------------------------------

  lifecycle:

    current_phase: PHASE_2B

    readiness:

      supports:

        - deterministic_runtime
        - replay_verification
        - authority_enforcement
        - CI_enforcement

      next_extension:

        - multi-node surface validation
        - dynamic surface admission
        - distributed execution surfaces

  # -----------------------------------------------------------------
  # CONSTITUTIONAL ASSERTION
  # -----------------------------------------------------------------

  constitutional_assertion: >
    Only declared surfaces exist in the AfriTech system.

    Execution is permitted exclusively on:
      - declared executable surfaces
      - under authority constraints
      - within deterministic boundaries

    Any surface not declared herein is considered non-existent.

  # -----------------------------------------------------------------
  # FINAL ASSERTION
  # -----------------------------------------------------------------

  final_assertion: >
    AfriTech operates as a surface-declared system.

    No declaration → no execution.
    No execution → no effect.
    No effect → no existence.