schema: afritech.governance.adr.v1

adr:
  id: ADR-0010
  title: AfriRide v0.2 Proof-of-Continuity Expansion
  status: PROPOSED
  type: CONSTITUTIONAL_EVOLUTION
  proposed_epoch: 7
  approved_at: "2026-05-13T00:00:00Z"
  registry_ref: ADR-0010

  authors:
    - AfriTech Governance

  related_artifacts:
    - ecosystems/afriride/v0_2/
    - ecosystems/afriride/AFRIRIDE_V0_FREEZE.md

  context: >
    AfriRide v0.1 established deterministic, replay-verifiable
    coordination under a single controlled failure scenario.
    That version was constitutionally frozen under Epoch 6
    as immutable Proof-of-Continuity evidence.

    AfriRide v0.2 extends this proof to a bounded and explicitly
    declared failure space, demonstrating that deterministic,
    authority-governed coordination remains replay-sound across
    multiple failure modes without mutating or weakening v0.1.

  decision: >
    Introduce AfriRide v0.2 as a new Proof-of-Continuity surface
    that expands the validated failure space while preserving
    all AfriRide v0.1 guarantees.

    AfriRide v0.2 is introduced as an additive, layered system
    operating under a new determinism envelope and execution
    runtime, without modification of the frozen constitutional
    core.

  constraints:
    - v0.1 artifacts must remain immutable
    - v0.2 execution must be externally layered
    - replay identity must be preserved across versions
    - failure modes must be explicitly declared
    - no non-deterministic behavior is permitted

  scope:
    added:
      - DRIVER_DROPOUT deterministic failure scenario
      - DRIVER_REJECTION_CHAIN deterministic failure scenario
      - TIMEOUT_EXCEEDED deterministic failure scenario
      - v0.2 deterministic failure taxonomy
      - v0.2 determinism envelope
      - multi-scenario continuity metrics:
          - CONTINUITY_COVERAGE (CC)
          - DETERMINISTIC_REFUSAL_RATE (DRR)
      - v0.2 execution handlers
      - v0.2 runtime wrapper

    preserved:
      - AfriRide v0.1 (constitutionally frozen)
      - v0.1 determinism guarantees
      - v0.1 replay identity guarantees
      - v0.1 authority model
      - v0.1 execution law

  invariants:
    - INVARIANT-V0-1-IMMUTABILITY
    - INVARIANT-V0-2-LAYERED-EXECUTION
    - INVARIANT-REPLAY-HASH-IDENTITY
    - INVARIANT-DETERMINISTIC-REFUSAL-REQUIRED
    - INVARIANT-FAILURE-TAXONOMY-COMPLETE
    - INVARIANT-NO-NONDETERMINISM
    - INVARIANT-DETERMINISM-ENVELOPE-ENFORCED

  validation_pipeline:
    - runtime_admission
    - runtime_orchestration
    - runtime_activation
    - guard_engine
    - runtime_engine
    - proof_generator
    - evaluation_engine
    - replay_verification
    - registry_seal
    - continuity_validator

  enforced_by:
    - afritech.runtime.engine
    - afritech.guards.guard_engine
    - afritech.verify.replay
    - afritech.proof
    - afritech.evaluation
    - afritech.registry.seal
    - ecosystems.afriride.v0_2.runtime_wrapper

  evidence:
    executable:
      - ecosystems/afriride/v0_2/run_multi_scenario_demo.py

    scenarios:
      - ecosystems/afriride/v0_2/scenarios/driver_dropout.yaml
      - ecosystems/afriride/v0_2/scenarios/rejection_chain.yaml
      - ecosystems/afriride/v0_2/scenarios/timeout.yaml

    metrics:
      DECISION_DETERMINISM_RATE: 1.0
      CONTINUITY_COVERAGE: 1.0
      DETERMINISTIC_REFUSAL_RATE: 1.0

    replay:
      execution_hash_match: true
      replay_hash_match: true
      verifier_status: VALID

  dependencies:
    - ADR-0001
    - ADR-0002
    - ADR-0003
    - ADR-0004
    - ADR-0005
    - ADR-0006
    - ADR-0007
    - ADR-0008
    - ADR-0009

  implementation_notes: >
    AfriRide v0.2 introduces an expanded deterministic failure space
    validated through replay-verifiable execution.

    The system MUST enforce:
      1. v0.1 artifacts remain frozen and unmodified
      2. v0.2 operates as an external layered execution surface
      3. All scenarios must produce deterministic outputs
      4. Replay must reproduce identical execution and hash outputs
      5. Deterministic refusal must occur when constraints are violated

    Continuity validation MUST:
      - validate all declared failure scenarios
      - verify deterministic response behavior
      - enforce completeness of failure taxonomy
      - ensure no undeclared execution path exists

  consequences:
    positive:
      - expands AfriRide continuity proof to multiple failure modes
      - strengthens AfriTech institutional credibility
      - demonstrates scalable governance without historical mutation
      - preserves replay-verifiable lineage across epochs
      - proves deterministic execution under failure diversity

    negative:
      - requires new constitutional epoch (Epoch 7)
      - increases governance surface area
      - introduces additional audit responsibilities
      - adds complexity to replay validation

  links:
    epochs:
      - EPOCH_0007

    surfaces:
      - ecosystems.afriride.v0_2
      - runtime.engine
      - proof
      - evaluation
      - replay_verification

  traceability:
    related_files:
      - ecosystems/afriride/v0_2/run_multi_scenario_demo.py
      - ecosystems/afriride/v0_2/scenarios/
      - ecosystems/afriride/v0_2/runtime_wrapper.py
      - afritech/verify/replay.py
      - afritech/proof/
      - afritech/evaluation/
      - afritech/guards/

  integrity:
    immutable: true
    replay_protected: true
    registry_included: true
