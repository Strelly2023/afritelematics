# ============================================================
# AFRITECH SEMANTIC ENFORCEMENT REGISTRY
# ============================================================

schema: afritech.constitution.semantic_enforcement.v2

meta:

  description: >
    Semantic runtime enforcement projection for executable
    constitutional invariants.

  projection_model: runtime_subset_projection

  canonical_registry: >
    afritech/constitution/INVARIANTS.yaml

  compiled_projection: >
    afritech/constitution/compiled/invariants_ir.json

  deterministic: true
  replay_safe: true
  closed_world_aligned: true


# ============================================================
# SEMANTIC ENFORCEMENT REGISTRY
# ============================================================

semantic_enforcement:

  # ----------------------------------------------------------
  # AFRIRIDE DETERMINISTIC RUNTIME
  # ----------------------------------------------------------

  afriride_deterministic_runtime:

    description: >
      Deterministic, replay-safe, epoch-bounded,
      closed-world execution enforced by the
      AfriRide runtime execution kernel.

    runtime_projection: true

    projection_of:
      - I1_REGISTRY_AUTHORITY
      - I2_SEALED_SURFACE
      - I3_NO_SILENT_MUTATION
      - I4_DETERMINISTIC_RUNTIME
      - I5_EPOCH_MONOTONIC
      - I6_CLOSED_EXECUTION_WORLD

    enforced_invariants:

      - I1_REGISTRY_AUTHORITY
      - I2_SEALED_SURFACE
      - I3_NO_SILENT_MUTATION
      - I4_DETERMINISTIC_RUNTIME
      - I5_EPOCH_MONOTONIC
      - I6_CLOSED_EXECUTION_WORLD

    # ========================================================
    # ENFORCEMENT COMPONENTS
    # ========================================================

    enforced_by:

      # ------------------------------------------------------
      # I1 — REGISTRY AUTHORITY
      # ------------------------------------------------------

      I1_REGISTRY_AUTHORITY:

        components:
          - afritech/registry/registry.yaml
          - afritech/runtime/admission.py
          - afritech/runtime/registry_authority_guard.py

        guarantees:
          - canonical registry authority
          - registry hash binding
          - replay-safe registry lineage
          - prevention of registry shadowing

        refusal_modes:
          - runtime_refusal
          - replay_invalid
          - constitutional_invalid


      # ------------------------------------------------------
      # I2 — SEALED EXECUTION SURFACE
      # ------------------------------------------------------

      I2_SEALED_SURFACE:

        components:
          - afritech/runtime/execution_surface.py
          - afritech/runtime/admission.py
          - ecosystems/afriride/runtime/execution/deterministic_executor.py

        guarantees:
          - execution surface sealing
          - hash-attested runtime admission
          - immutable execution topology
          - runtime boundary integrity

        refusal_modes:
          - execution_refused
          - surface_invalid
          - constitutional_invalid


      # ------------------------------------------------------
      # I3 — NO SILENT MUTATION
      # ------------------------------------------------------

      I3_NO_SILENT_MUTATION:

        components:
          - ecosystems/afriride/runtime/mutation.py
          - ecosystems/afriride/runtime/state.py
          - afritech/proof/witness_generator.py

        guarantees:
          - explicit mutation tracing
          - replay-safe state transitions
          - witness-bound mutation lineage
          - deterministic mutation ordering

        refusal_modes:
          - mutation_invalid
          - witness_invalid
          - replay_invalid


      # ------------------------------------------------------
      # I4 — DETERMINISTIC RUNTIME
      # ------------------------------------------------------

      I4_DETERMINISTIC_RUNTIME:

        components:
          - ecosystems/afriride/runtime/execution/deterministic_executor.py
          - ecosystems/afriride/runtime/mutation.py
          - ecosystems/afriride/runtime/state.py

        guarantees:
          - canonical command ordering
          - immutable Δ-based transitions
          - replay-stable trace hashing
          - observer-independent execution
          - deterministic witness generation

        refusal_modes:
          - replay_divergence
          - equivalence_failure
          - deterministic_violation


      # ------------------------------------------------------
      # I5 — EPOCH MONOTONICITY
      # ------------------------------------------------------

      I5_EPOCH_MONOTONIC:

        components:
          - ecosystems/afriride/runtime/execution/deterministic_executor.py
          - afritech/registry/registry.yaml
          - afritech/runtime/epoch_guard.py

        guarantees:
          - explicit epoch-bound execution
          - future-epoch rejection
          - replay-safe epoch lineage
          - monotonic governance ordering

        refusal_modes:
          - epoch_invalid
          - replay_invalid
          - lineage_invalid


      # ------------------------------------------------------
      # I6 — CLOSED EXECUTION WORLD
      # ------------------------------------------------------

      I6_CLOSED_EXECUTION_WORLD:

        components:
          - ecosystems/afriride/runtime/execution/deterministic_executor.py
          - afritech/constitution/path_ontology.yaml
          - afritech/ci/import_topology_validator.py

        guarantees:
          - explicit runtime allowlists
          - rejection of undeclared runtime entities
          - closed mutation surface
          - deterministic ontology boundaries
          - replay-safe semantic closure

        refusal_modes:
          - ontology_invalid
          - execution_refusal
          - replay_invalid


# ============================================================
# VALIDATION GUARANTEES
# ============================================================

validation:

  deterministic_ordering: REQUIRED
  replay_safe_projection: REQUIRED
  closed_world_alignment: REQUIRED
  runtime_projection_subset_only: true
  canonical_registry_required: true
  duplicate_invariant_ids_forbidden: true


# ============================================================
# GUARANTEES
# ============================================================

guarantees:

  deterministic_execution: true
  replay_safe_execution: true
  witness_generation_required: true
  constitutional_projection_verified: true
  semantic_projection_verified: true
  runtime_projection_verified: true
  closed_world_execution: true