# afritech/constitution/INVARIANTS.yaml

# =========================================================
# AFRITECH CONSTITUTIONAL INVARIANTS
# =========================================================

schema: afritech.constitution.invariants.v1

meta:
  description: >
    Immutable constitutional constraints governing system behavior.
    These invariants define the fundamental laws that MUST NEVER be violated
    by runtime, governance, or infrastructure layers.

  authority: registry
  enforcement: REQUIRED
  mutability: FORBIDDEN
  deterministic: true
  replay_safe: true


# =========================================================
# CORE CONSTITUTIONAL INVARIANTS
# =========================================================

invariants:

  # ------------------------------------------------------
  # I1 — SINGLE SOURCE OF TRUTH
  # ------------------------------------------------------
  - id: I1_REGISTRY_AUTHORITY
    category: AUTHORITY_ROOT
    description: >
      The registry is the sole source of truth for all constitutional state.
      No runtime, replay, governance, or semantic layer may override,
      shadow, reinterpret, or bypass registry authority.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I2 — SEALED EXECUTION SURFACE
  # ------------------------------------------------------
  - id: I2_SEALED_SURFACE
    category: EXECUTION_BOUNDARY
    description: >
      All execution surfaces must match registry-declared files,
      hashes, and admissible runtime topology.
      Any mismatch must halt execution.
    enforcement: REQUIRED
    violation_class: B_STRUCTURAL


  # ------------------------------------------------------
  # I3 — NO SILENT MUTATION
  # ------------------------------------------------------
  - id: I3_NO_SILENT_MUTATION
    category: STATE_INTEGRITY
    description: >
      Constitutional state must never mutate implicitly.
      All state transitions must be explicit, replayable,
      witness-bound, and constitutionally admissible.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I4 — DETERMINISTIC EXECUTION
  # ------------------------------------------------------
  - id: I4_DETERMINISTIC_RUNTIME
    category: REPLAY_INTEGRITY
    description: >
      The same RuntimeContext must always produce identical execution
      outputs, witnesses, hashes, replay traces, and execution semantics.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I5 — EPOCH MONOTONICITY
  # ------------------------------------------------------
  - id: I5_EPOCH_MONOTONIC
    category: TEMPORAL_INTEGRITY
    description: >
      Constitutional epochs must advance monotonically.
      Epoch rollback, aliasing, divergence, or replay ambiguity
      is constitutionally forbidden.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I6 — CLOSED EXECUTION WORLD
  # ------------------------------------------------------
  - id: I6_CLOSED_EXECUTION_WORLD
    category: CLOSED_WORLD_ENFORCEMENT
    description: >
      Only explicitly declared constitutional entities,
      runtime surfaces, semantic artifacts, and witnesses
      may participate in execution or replay semantics.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I7 — AUTHORITY DECLARATION
  # ------------------------------------------------------
  - id: I7_AUTHORITY_DECLARATION
    category: AUTHORITY_CONTROL
    description: >
      Authority must be explicitly declared before execution begins.
      Execution without authority declaration is constitutionally invalid.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I8 — NO AUTHORITY ESCALATION
  # ------------------------------------------------------
  - id: I8_NO_AUTHORITY_ESCALATION
    category: AUTHORITY_CONTROL
    description: >
      Execution cannot derive, elevate, infer, or expand authority
      beyond what is explicitly declared.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I9 — PROOF REQUIRED
  # ------------------------------------------------------
  - id: I9_PROOF_REQUIRED
    category: PROOF_ENFORCEMENT
    description: >
      Every execution must produce replay-safe proofs,
      witnesses, and RuntimeCertificates.
      Execution without proof artifacts is invalid.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I10 — CONSENSUS DETERMINISM
  # ------------------------------------------------------
  - id: I10_CONSENSUS_DETERMINISM
    category: DISTRIBUTED_CONSISTENCY
    description: >
      Distributed constitutional execution must converge toward
      identical canonical replay semantics across all nodes.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I11 — NODE TRUST VALIDATION
  # ------------------------------------------------------
  - id: I11_NODE_HEALTH_REQUIRED
    category: DISTRIBUTED_TRUST
    description: >
      Nodes participating in constitutional execution must satisfy
      trust, health, replay, and attestation requirements.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I12 — HASH-BOUND IDENTITY
  # ------------------------------------------------------
  - id: I12_IDENTITY_INTEGRITY
    category: IDENTITY_INTEGRITY
    description: >
      Constitutional identity must remain hash-bound,
      canonical, replay-safe, and observer-independent.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I13 — EPOCH LINEAGE STABILITY
  # ------------------------------------------------------
  - id: I13_EPOCH_LINEAGE
    category: TEMPORAL_INTEGRITY
    description: >
      Governance lineage must remain deterministic,
      replay-safe, and cryptographically reconstructable.
    enforcement: REQUIRED
    violation_class: A_FATAL


  # ------------------------------------------------------
  # I14 — ADR GOVERNANCE REQUIRED
  # ------------------------------------------------------
  - id: I14_ADR_REQUIRED
    category: GOVERNANCE_CONTROL
    description: >
      Structural constitutional changes require explicit ADR approval
      before runtime admission.
    enforcement: REQUIRED
    violation_class: B_STRUCTURAL


  # ------------------------------------------------------
  # I15 — NON-EXECUTABLE ISOLATION
  # ------------------------------------------------------
  - id: I15_NON_EXECUTABLE_ISOLATION
    category: EXECUTION_BOUNDARY
    description: >
      Documentary, speculative, or non-runtime artifacts
      must never participate in constitutional execution semantics.
    enforcement: REQUIRED
    violation_class: B_STRUCTURAL


# =========================================================
# VALIDATION POLICY
# =========================================================

validation:

  deterministic_ordering: REQUIRED
  duplicate_ids_forbidden: true
  replay_safe_projection: true
  canonical_registry_required: true
  runtime_projection_subset_only: true


# =========================================================
# RUNTIME PROJECTION MODEL
# =========================================================

runtime_projection:

  executable_runtime_invariants:
    - I1_REGISTRY_AUTHORITY
    - I2_SEALED_SURFACE
    - I3_NO_SILENT_MUTATION
    - I4_DETERMINISTIC_RUNTIME
    - I5_EPOCH_MONOTONIC
    - I6_CLOSED_EXECUTION_WORLD


# =========================================================
# CONSTITUTIONAL GUARANTEES
# =========================================================

guarantees:

  replay_safe: true
  deterministic_execution: true
  closed_world_execution: true
  witness_required: true
  semantic_projection_verified: true
  constitutional_integrity_preserved: true
