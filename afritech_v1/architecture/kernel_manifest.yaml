schema: afritech.kernel.manifest.v1

# ---------------------------------------------------------------------
# Kernel location (legacy lineage)
# ---------------------------------------------------------------------

kernel_root: afritech_v1/kernel

# ---------------------------------------------------------------------
# Inclusion rules (historical reference only)
# ---------------------------------------------------------------------

include:
  - "*.py"
  - "*.md"

# ---------------------------------------------------------------------
# Exclusion rules
# ---------------------------------------------------------------------

exclude:
  - "__pycache__"
  - "*.pyc"
  - ".git"
  - ".gitignore"

# ---------------------------------------------------------------------
# Lineage & authority notes
# ---------------------------------------------------------------------

lineage:
  namespace: afritech_v1
