  participates_in_runtime: false
  included_in_hash_chain: false

# ---------------------------------------------------------------------
# Constitutional notice
# ---------------------------------------------------------------------

notice: >
  This kernel manifest belongs to the legacy afritech_v1 lineage.
  It is frozen and preserved for historical and documentary purposes
  only. It does not participate in runtime execution, registry
  attestation, replay verification, or constitutional enforcement.