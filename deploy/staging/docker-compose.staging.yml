services:
  afritech-api:
    build:
      context: ../..
      dockerfile: deploy/staging/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.staging
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - afritech.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  afritech-dashboard:
    build:
      context: ../..
      dockerfile: deploy/staging/Dockerfile.dashboard
      args:
        VITE_AFRIRIDE_API_URL: ${VITE_AFRIRIDE_API_URL:-http://127.0.0.1:8000}
        VITE_AFRIRIDE_APP_VERSION: ${VITE_AFRIRIDE_APP_VERSION:-staging-1}
    restart: unless-stopped
    env_file:
      - .env.staging
    ports:
      - "4173:4173"
    depends_on:
      afritech-api:
        condition: service_healthy
