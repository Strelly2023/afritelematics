services:
  - type: web
    name: afriride-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn afriride_system.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AFRIRIDE_TEST_MODE
        value: "true"
      - key: AFRIRIDE_PILOT_MODE
        value: "true"
      - key: AFRIRIDE_EVIDENCE_CAPTURE
        value: "true"
      - key: AFRIRIDE_REPLAY_REQUIRED
        value: "true"
      - key: AFRIRIDE_ALLOW_REAL_DEVICES
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11"