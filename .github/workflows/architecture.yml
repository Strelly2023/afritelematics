name: Architecture Enforcement

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  architecture:
    name: Enforce Architectural & Constitutional Invariants
    runs-on: ubuntu-latest

    env:
      AFRITECH_MODE: ci   # ✅ critical separation (CI vs runtime)

    steps:

      # ------------------------------------------------------------
      # CHECKOUT
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # PYTHON
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------
      # DEPENDENCIES
      # ------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ------------------------------------------------------------
      # CONSTITUTIONAL PIPELINE (CI SAFE)
      # ------------------------------------------------------------
      - name: Canonical constitutional pipeline
        run: python3 -m afritech.ci.constitutional_pipeline

      - name: Activate runtime boundary governance
        run: |
          python -m afritech.guards.guard_runtime_boundary_governance --fail-on-drift

      - name: Upload runtime boundary governance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: architecture-governance-artifacts
          path: |
            docs/reviews/AFRITECH_RUNTIME_BOUNDARY_SCAN.md
            docs/architecture/AFRITECH_FULL_ARCHITECTURE_GRAPH.md

      # ------------------------------------------------------------
      # ARCHITECTURAL / AST ENFORCEMENT
      # ------------------------------------------------------------
      - name: Validate import topology
        run: python -m afritech.ci.ast_import_validator

      - name: Validate constitutional call order
        run: python -m afritech.ci.ast_call_order_validator

      - name: Enforce mutation import confinement
        run: python -m afritech.ci.import_topology_enforcement

      # ------------------------------------------------------------
      # EXECUTION AUTHORITY ENFORCEMENT
      # ------------------------------------------------------------
      - name: Forbid direct execution bypass (kernel only)
        run: |
          violations=$(grep -R "execute(" afritech/ \
            | grep -v "kernel/execute.py" \
            | grep -v "\.spec")

          if [ ! -z "$violations" ]; then
            echo "❌ Direct execution bypass detected"
            echo "$violations"
            exit 1
          fi

          echo "✅ Execution authority enforced"

      # ------------------------------------------------------------
      # DETERMINISM ENFORCEMENT (REAL)
      # ------------------------------------------------------------
      - name: Enforce AST-level determinism
        run: |
          python - <<EOF
          import ast
          import os

          FORBIDDEN = ["random", "time", "uuid", "os.urandom"]

          for root, _, files in os.walk("afritech"):
              for f in files:
                  if f.endswith(".py"):
                      path = os.path.join(root, f)
                      with open(path, "r") as file:
                          tree = ast.parse(file.read(), filename=path)

                      for node in ast.walk(tree):
                          if isinstance(node, ast.Import):
                              for n in node.names:
                                  if n.name in FORBIDDEN:
                                      raise Exception(f"❌ Non-deterministic import in {path}: {n.name}")

          print("✅ Determinism enforced")
          EOF

      # ------------------------------------------------------------
      # EPOCH & SPECULATION ISOLATION
      # ------------------------------------------------------------
      - name: Forbid raw epoch access
        run: python -m afritech.ci.forbid_raw_epoch_access

      - name: Forbid speculative runtime access
        run: python -m afritech.ci.forbid_speculative_runtime_access

      # ------------------------------------------------------------
      # TOPOLOGY FREEZE
      # ------------------------------------------------------------
      - name: Enforce topology freeze
        run: python -m afritech.ci.forbid_topology_change

      # ------------------------------------------------------------
      # FINAL CONFIRMATION
      # ------------------------------------------------------------
      - name: Architecture enforcement complete
        run: |
          echo "✅ Architectural topology verified"
          echo "✅ Execution authority closed"
          echo "✅ Determinism enforced at kernel boundary"
          echo "✅ No constitutional bypasses detected"
