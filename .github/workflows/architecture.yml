name: AfriTech Constitutional Guard

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  enforce:
    name: Enforce Constitutional Sovereignty
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # Checkout source
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Setup Python
      # ---------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------
      # Install minimal dependencies
      # ---------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      # ---------------------------------------------------
      # Constitutional Guard — Runtime Enforcement (LAW)
      # ---------------------------------------------------
      - name: Verify Constitutional Sovereignty
        shell: bash
        run: |
          set -e
          python << 'EOF'
          from afritech.guards.engine import verify_sovereignty

          verify_sovereignty()
          print("✅ Constitutional runtime integrity verified")
          EOF

      # ---------------------------------------------------
      # Constitutional Replay Verification — LEGITIMACY
      # ---------------------------------------------------
      - name: Verify Constitutional Replay Validity
        shell: bash
        run: |
          set -e
          python -m afritech.verify.replay