# .github/workflows/constitutional_enforcement.yml

name: Constitutional Enforcement

on:

  push:

    branches:

      - main
      - master

  pull_request:

    branches:

      - main
      - master


jobs:

  constitutional-validation:

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      # ======================================================
      # CHECKOUT
      # ======================================================

      - name: Checkout repository

        uses: actions/checkout@v4


      # ======================================================
      # PYTHON
      # ======================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"


      # ======================================================
      # DEPENDENCIES
      # ======================================================

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pyyaml pytest


      # ======================================================
      # CONSTITUTIONAL VALIDATION
      # ======================================================

      - name: Canonical constitutional pipeline

        run: python3 -m afritech.ci.constitutional_pipeline


      - name: Constitutional Validation

        run: python3 -m afritech.ci.constitutional_validation


      # ======================================================
      # PYTEST
      # ======================================================

      - name: Run test suite

        run: pytest -q
